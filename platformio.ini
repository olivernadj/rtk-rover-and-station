; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:stationary]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = arduino
monitor_speed = 115200
extra_scripts = pre:read_version.py
build_flags = -D MODE_STATIONARY -D OTA_ENABLED
lib_deps =
; Internal
    Wire
; External
    sparkfun/SparkFun u-blox GNSS v3@^3.1.13
    marvinroger/AsyncMqttClient@^0.9.0
    adafruit/Adafruit NeoPixel@^1.12.0



[env:rover]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = arduino
monitor_speed = 115200
extra_scripts = pre:read_version.py
build_flags = -D MODE_ROVER
lib_deps =
; Internal
    Wire
; External
    sparkfun/SparkFun u-blox GNSS v3@^3.1.13
    marvinroger/AsyncMqttClient@^0.9.0
    adafruit/Adafruit NeoPixel@^1.12.0


; Rover hosted on the ESP32-2432S028 "CYD" USB-C variant (ESP32-WROOM-32, 320x240 ILI9341, no PSRAM).
; GNSS I2C on CN1 header (SDA=22, SCL=27). Status LED = onboard active-LOW RGB on GPIO 4/16/17.
; See rtk-rover-and-station/docs for the full hardware map.
[env:rover-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:read_version.py
build_flags =
    -D MODE_ROVER
    -D BOARD_CYD
    ; -D CYD_FAKE_STATE  ; uncomment for bench-testing the HUD without a ZED-F9P attached
    ; --- TFT_eSPI (configured entirely from here; library is untouched) ---
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- XPT2046 touch (separate soft-SPI bus; used by src/touch_cyd.cpp) ---
    -D CYD_TOUCH_CLK=25
    -D CYD_TOUCH_MOSI=32
    -D CYD_TOUCH_MISO=39
    -D CYD_TOUCH_CS=33
    -D CYD_TOUCH_IRQ=36
lib_deps =
; Internal
    Wire
; External
    sparkfun/SparkFun u-blox GNSS v3@^3.1.13
    marvinroger/AsyncMqttClient@^0.9.0
    bodmer/TFT_eSPI@^2.5.43


